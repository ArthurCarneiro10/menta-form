<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Menta · Pesquisa de Consumo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --menta-50:#eaf7f1;--menta-100:#7cdbb9;--menta-200:#7ad9b7;--menta-400:#407c66;
    --menta-500:#3d7d66;--menta-700:#183e31;--menta-800:#0c2019;
    --ink:#010302;--bg:#f8faf8;--card:#ffffff;--line:#e8efea;
    --brand:#7ad9b7;--brand-hover:#7cdbb9;
    --shadow:0 18px 44px -26px rgba(1,3,2,.30);--r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Plus Jakarta Sans",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(900px 480px at 88% -6%, rgba(122,217,183,.16), transparent 60%),var(--bg);
    min-height:100%;-webkit-font-smoothing:antialiased;line-height:1.5}

  .appbar{background:var(--menta-800);padding:16px 18px 14px;position:sticky;top:0;z-index:20;box-shadow:0 10px 30px -22px rgba(1,3,2,.8)}
  .appbar-in{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .logo-h{height:30px;width:auto;display:block}
  .pct{margin-left:auto;font-size:13px;color:var(--menta-100);font-weight:600;font-variant-numeric:tabular-nums}
  .track{position:relative;max-width:600px;margin:13px auto 0;height:7px;border-radius:999px;background:rgba(124,219,185,.18)}
  .track-fill{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--menta-200);border-radius:999px;transition:width .5s cubic-bezier(.4,1.1,.4,1)}
  .marker{position:absolute;top:50%;translate:-50% -50%;left:0;width:20px;height:20px;border-radius:50%;background:#fff;display:grid;place-items:center;box-shadow:0 2px 8px rgba(1,3,2,.4);transition:left .5s cubic-bezier(.4,1.1,.4,1)}
  .marker svg{width:11px;height:11px}
  .steps-label{max-width:600px;margin:9px auto 0;font-size:12px;color:var(--menta-100);font-weight:500;opacity:.85}

  .wrap{max-width:600px;margin:0 auto;padding:0 16px}
  .stage{padding:22px 0 56px;min-height:calc(100dvh - 120px);display:flex;flex-direction:column;justify-content:center}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:30px 26px;animation:rise .42s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--menta-500);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .eyebrow::before{content:"";width:16px;height:3px;background:var(--menta-200);border-radius:3px}
  h1{font-weight:800;font-size:clamp(25px,6.6vw,32px);line-height:1.12;letter-spacing:-.02em;margin-bottom:14px}
  h2{font-weight:700;font-size:clamp(20px,5vw,25px);line-height:1.22;letter-spacing:-.015em;margin-bottom:8px}
  .lead{color:var(--menta-500);font-size:15.5px;font-weight:500}
  .qhint{color:var(--menta-500);font-size:13.5px;margin:-1px 0 18px;font-weight:500}
  .sublist{font-size:14.5px;margin:16px 0 0;display:grid;gap:11px}
  .sublist li{list-style:none;display:flex;gap:10px;align-items:flex-start;color:var(--ink);font-weight:500}
  .sublist svg{flex:none;margin-top:2px}

  .opts{display:grid;gap:10px;margin-top:6px}
  .opt{position:relative;display:flex;align-items:center;gap:13px;border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;background:#fff;transition:border-color .16s,background .16s,transform .1s;font-size:15.5px;font-weight:600;color:var(--ink)}
  .opt:hover{border-color:var(--menta-200);background:var(--menta-50)}
  .opt:active{transform:scale(.993)}
  .opt .box{flex:none;width:23px;height:23px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;transition:.16s}
  .opt[data-type="radio"] .box{border-radius:50%}
  .opt .box svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:.18s}
  .opt.sel{border-color:var(--menta-200);background:var(--menta-50)}
  .opt.sel .box{background:var(--menta-200);border-color:var(--menta-200)}
  .opt.sel .box svg{opacity:1;transform:none}
  .opt:focus-visible{outline:3px solid rgba(122,217,183,.55);outline-offset:2px}

  /* escala 1–10 compacta */
  .scale{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
  .scale .opt{flex:1 1 40px;min-width:40px;justify-content:center;padding:14px 0;font-size:17px;font-weight:800}
  .scale-ends{display:flex;justify-content:space-between;gap:14px;color:var(--menta-500);font-size:12.5px;margin-top:10px;font-weight:600}
  .scale-ends span{flex:1}
  .scale-ends span:last-child{text-align:right}

  .other-wrap{margin-top:10px}
  .field{margin-top:6px}
  input[type=text],input[type=email]{width:100%;font:inherit;font-size:16px;font-weight:500;color:var(--ink);border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;background:#fff;transition:border-color .16s,box-shadow .16s}
  input:focus{outline:none;border-color:var(--menta-200);box-shadow:0 0 0 4px rgba(122,217,183,.30)}

  .nav{display:flex;gap:10px;align-items:center;margin-top:26px}
  .btn{font:inherit;font-weight:700;font-size:15.5px;border:none;border-radius:13px;padding:15px 22px;cursor:pointer;transition:transform .1s,box-shadow .2s,background .18s,opacity .2s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--menta-200);color:var(--ink);box-shadow:0 10px 22px -12px var(--menta-500);margin-left:auto;display:inline-flex;align-items:center;gap:9px}
  .btn-primary:hover{background:var(--menta-100)}
  .btn-ghost{background:transparent;color:var(--menta-500);padding:15px 10px}
  .btn-ghost:hover{color:var(--ink)}
  .btn-primary svg{width:17px;height:17px}
  .note{display:none;align-items:center;gap:9px;margin-top:14px;background:var(--menta-50);color:var(--menta-500);font-size:13.5px;font-weight:600;padding:11px 13px;border-radius:11px}
  .note.show{display:flex}
  .note svg{flex:none;width:16px;height:16px}

  .done{background:linear-gradient(160deg,var(--menta-700),var(--menta-800));border:none;color:#fff;text-align:center;padding:40px 26px}
  .done .seal{width:96px;height:96px;margin:0 auto 18px;animation:pop .6s cubic-bezier(.2,1.4,.4,1) both}
  .done .seal img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 8px 20px rgba(0,0,0,.45))}
  @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:none;opacity:1}}
  .done h2{color:#fff}.done .lead{color:var(--menta-100)}
  .summary{text-align:left;margin-top:24px;border-top:1px solid rgba(124,219,185,.22);padding-top:20px}
  .summary h3{font-size:13px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;color:var(--menta-100);font-weight:700}
  .sumrow{display:grid;gap:3px;margin-bottom:15px}
  .sumrow .q{font-size:12.5px;color:var(--menta-100);font-weight:600;opacity:.85}
  .sumrow .a{font-size:15px;font-weight:600;color:#fff}
  .restart{margin-top:6px;justify-content:center}
  .done .btn-ghost{color:var(--menta-100);border:1.5px solid rgba(124,219,185,.4);border-radius:12px}
  .done .btn-ghost:hover{color:#fff;background:rgba(124,219,185,.12)}

  .burst{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:60}
  .burst i{position:absolute;top:-24px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(112vh) rotate(560deg);opacity:0}}

  @media (max-width:480px){.panel{padding:26px 20px}.logo-h{height:27px}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

/* ===== Link da planilha (Apps Script Web App) ===== */
const ENDPOINT="https://script.google.com/macros/s/AKfycbyBqszZzjy4pqh1j4TcOWCeqIR-ZIfyuDKvaYYQy5axRXVVZXdlrok9jn-0LW8GSoSR/exec";

const CFG=JSON.parse(document.getElementById('config').textContent);
const root=document.getElementById('root'),fill=document.getElementById('fill'),
marker=document.getElementById('marker'),pct=document.getElementById('pct'),stepsLabel=document.getElementById('stepsLabel');
const total=CFG.steps.length;
let idx=-1, SENT=false; const answers={}, otherText={};
const OTHER="__other__";

const ICONS={
  check:'<svg viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="#010302" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#010302" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#3d7d66" stroke-width="2"/><path d="M12 11v5M12 8h.01" stroke="#3d7d66" stroke-width="2" stroke-linecap="round"/></svg>'
};
function tick(){return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="#7ad9b7"/><path d="M17 8.5 10.5 15 7 11.5" stroke="#010302" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setProgress(){
  let p=idx<0?0:idx>=total?100:Math.round(idx/total*100);
  fill.style.width=p+'%';marker.style.left=p+'%';pct.textContent=p+'%';
  stepsLabel.textContent=idx<0?`${total} perguntas`:idx>=total?'Concluído':`Pergunta ${idx+1} de ${total}`;
}
function render(){setProgress();if(idx<0)return intro();if(idx>=total)return done();step(CFG.steps[idx]);}

function intro(){const i=CFG.intro;
  root.innerHTML=`<div class="panel"><div class="eyebrow">${i.eyebrow}</div><h1>${i.title}</h1>
    <p class="lead">${i.lead}</p>
    <ul class="sublist">${i.bullets.map(b=>`<li>${tick()}<span>${b}</span></li>`).join('')}</ul>
    <div class="nav"><button class="btn btn-primary" id="next">${i.cta} ${ICONS.arrow}</button></div></div>`;
  document.getElementById('next').onclick=()=>{idx=0;render();};
}

function step(s){
  const key=idx; let body='';
  const opts=(s.options||[]).slice(); if(s.other)opts.push(OTHER);

  if(s.type==='radio'||s.type==='checkbox'){
    const sel=answers[key]||(s.type==='checkbox'?[]:null);
    const cls=s.type==='checkbox'?'check':'radio';
    body=`<div class="opts">${opts.map(o=>{
      const on=s.type==='checkbox'?sel.includes(o):sel===o;
      const label=o===OTHER?'Outro':esc(o);
      return `<div class="opt ${on?'sel':''}" data-type="${cls}" data-val="${esc(o)}" role="${s.type==='radio'?'radio':'checkbox'}" aria-checked="${on}" tabindex="0"><span class="box">${ICONS.check}</span><span>${label}</span></div>`;
    }).join('')}</div>`;
    if(s.other)body+=`<div class="other-wrap" id="otherWrap" style="display:none"><input type="text" id="otherTxt" placeholder="Conte pra gente…" value="${esc(otherText[key]||'')}"></div>`;
  } else if(s.type==='scale'){
    const sel=answers[key];
    body=`<div class="opts scale">${Array.from({length:s.max-s.min+1},(_,n)=>{const v=s.min+n,on=sel===v;
      return `<div class="opt ${on?'sel':''}" data-val="${v}" role="radio" aria-checked="${on}" tabindex="0">${v}</div>`;}).join('')}</div>
      <div class="scale-ends"><span>${esc(s.left)}</span><span>${esc(s.right)}</span></div>`;
  } else if(s.type==='text'){
    body=`<div class="field"><input type="${s.input||'text'}" id="txt" placeholder="${esc(s.placeholder||'')}" value="${esc(answers[key]||'')}"></div>`;
  } else if(s.type==='fields'){
    const v=answers[key]||{};
    body=`<div class="field" style="display:grid;gap:13px">`+s.fields.map(f=>
      `<div><label style="display:block;font-size:13px;font-weight:600;color:var(--menta-500);margin-bottom:6px">${esc(f.label)}${f.required?'':' (opcional)'}</label>`+
      `<input type="${f.input||'text'}" data-fkey="${f.key}" inputmode="${f.input==='tel'?'tel':(f.input==='email'?'email':'text')}" autocomplete="${f.input==='tel'?'tel':(f.input==='email'?'email':'name')}" placeholder="${esc(f.placeholder||'')}" value="${esc(v[f.key]||'')}"></div>`
    ).join('')+`</div>`;
  }

  root.innerHTML=`<div class="panel"><div class="eyebrow">${s.eyebrow||'Menta'}</div><h2>${s.title}</h2>
    ${s.hint?`<p class="qhint">${s.hint}</p>`:'<div style="height:8px"></div>'}
    ${body}
    <div class="note" id="note"><span>${ICONS.info}</span><span id="noteTxt"></span></div>
    <div class="nav"><button class="btn btn-ghost" id="back">Voltar</button>
    <button class="btn btn-primary" id="next">${idx===total-1?'Enviar':'Continuar'} ${ICONS.arrow}</button></div></div>`;

  document.getElementById('back').onclick=()=>{idx--;render();};
  document.getElementById('next').onclick=()=>next(s,key);

  const refreshOther=()=>{const w=document.getElementById('otherWrap');if(!w)return;
    const a=answers[key];const show=s.type==='checkbox'?(a&&a.includes(OTHER)):a===OTHER;
    w.style.display=show?'block':'none';};

  if(s.type==='radio'||s.type==='scale'){
    root.querySelectorAll('.opt').forEach(el=>{
      const pick=()=>{answers[key]=s.type==='scale'?+el.dataset.val:el.dataset.val;
        root.querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel');o.setAttribute('aria-checked','false')});
        el.classList.add('sel');el.setAttribute('aria-checked','true');refreshOther();hideNote();
        if(el.dataset.val===OTHER){const t=document.getElementById('otherTxt');if(t)t.focus();}};
      el.onclick=pick;el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();pick();}};
    });
  }
  if(s.type==='checkbox'){
    answers[key]=answers[key]||[];
    root.querySelectorAll('.opt').forEach(el=>{
      const t=()=>{const v=el.dataset.val,arr=answers[key],i=arr.indexOf(v);
        if(i>=0)arr.splice(i,1);else{if(s.max&&arr.length>=s.max){showNote(`Você pode escolher no máximo ${s.max}.`);return;}arr.push(v);}
        el.classList.toggle('sel',arr.includes(v));el.setAttribute('aria-checked',arr.includes(v));refreshOther();hideNote();
        if(v===OTHER&&arr.includes(v)){const tx=document.getElementById('otherTxt');if(tx)tx.focus();}};
      el.onclick=t;el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();t();}};
    });
  }
  if(s.other){const ot=document.getElementById('otherTxt');if(ot)ot.oninput=()=>{otherText[key]=ot.value;hideNote();};}
  if(s.type==='text'){const tx=document.getElementById('txt');tx.oninput=()=>{answers[key]=tx.value;hideNote();};}
  if(s.type==='fields'){answers[key]=answers[key]||{};
    root.querySelectorAll('input[data-fkey]').forEach(inp=>{inp.oninput=()=>{answers[key][inp.dataset.fkey]=inp.value;hideNote();};});}
  refreshOther();
}

function next(s,key){
  if(s.type==='fields'){
    const v=answers[key]||{};
    for(const f of s.fields){
      const val=(v[f.key]||'').trim();
      if(f.required&&!val){showNote('Preencha '+f.label.toLowerCase()+' pra seguir 🙂');return;}
      if(val&&f.input==='email'&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){showNote('Confira o e-mail digitado.');return;}
      if(val&&f.input==='tel'&&val.replace(/\D/g,'').length<10){showNote('Confira o telefone (com DDD).');return;}
    }
    idx++;render();return;
  }
  if(s.required){
    const a=answers[key];
    const empty=a==null||a===''||(Array.isArray(a)&&!a.length);
    if(empty){showNote('Responda pra seguir 🙂');return;}
  }
  const a=answers[key];
  const usesOther=s.other&&((Array.isArray(a)&&a.includes(OTHER))||a===OTHER);
  if(usesOther&&!(otherText[key]||'').trim()){showNote('Escreva sua resposta no campo "Outro".');return;}
  idx++;render();
}
function showNote(m){const n=document.getElementById('note');document.getElementById('noteTxt').textContent=m;n.classList.add('show');}
function hideNote(){const n=document.getElementById('note');if(n)n.classList.remove('show');}

function fmt(s,i){
  let a=answers[i];
  if(a==null||a===''||(Array.isArray(a)&&!a.length))return'';
  if(Array.isArray(a))return a.map(v=>v===OTHER?('Outro: '+(otherText[i]||'')):v).join('; ');
  if(s.type==='slider')return (a===0&&s.zero)?s.zero:(s.prefix||'')+a+(s.suffix||'');
  if(s.type==='scale')return a+' de '+s.max;
  if(a===OTHER)return 'Outro: '+(otherText[i]||'');
  return a;
}

function sendData(){
  if(!ENDPOINT||SENT)return;SENT=true;
  const perguntas=[],respostas=[];
  CFG.steps.forEach((s,i)=>{
    if(s.type==='fields'){s.fields.forEach(f=>{perguntas.push(f.label);respostas.push(((answers[i]||{})[f.key]||'').trim());});}
    else{perguntas.push(s.hint?`${s.title} ${s.hint}`:s.title);respostas.push(fmt(s,i));}
  });
  try{fetch(ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({perguntas,respostas})});}catch(e){}
}

function done(){
  sendData();burst();const d=CFG.done;
  const rows=CFG.steps.map((s,i)=>{
    if(s.type==='fields'){return s.fields.map(f=>{const v=((answers[i]||{})[f.key]||'').trim();
      return v?`<div class="sumrow"><span class="q">${esc(f.label)}</span><span class="a">${esc(v)}</span></div>`:'';}).join('');}
    const a=fmt(s,i);if(!a)return'';
    return `<div class="sumrow"><span class="q">${s.title}</span><span class="a">${esc(a)}</span></div>`;}).join('');
  root.innerHTML=`<div class="panel done"><div class="seal"><img src="${SYMBOL}" alt="Menta"></div>
    <h2>${d.title}</h2><p class="lead">${d.lead}</p>
    <div class="summary"><h3>Suas respostas</h3>${rows||'<p class="lead">—</p>'}</div>
    <div class="nav restart"><button class="btn btn-ghost" id="again">Responder de novo</button></div></div>`;
  document.getElementById('again').onclick=()=>{SENT=false;for(const k in answers)delete answers[k];for(const k in otherText)delete otherText[k];idx=-1;render();};
}

function burst(){
  if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  const b=document.createElement('div');b.className='burst';const cols=['#7ad9b7','#7cdbb9','#3d7d66','#eaf7f1'];
  for(let i=0;i<28;i++){const s=document.createElement('i');const sz=7+Math.random()*11;
    s.style.left=Math.random()*100+'%';s.style.width=sz+'px';s.style.height=sz+'px';
    s.style.background=cols[i%cols.length];s.style.borderRadius='0 100% 0 100%';
    s.style.animationDuration=(2.2+Math.random()*1.8)+'s';s.style.animationDelay=(Math.random()*.5)+'s';b.appendChild(s);}
  document.body.appendChild(b);setTimeout(()=>b.remove(),4600);
}
render();
</script>
</body>
